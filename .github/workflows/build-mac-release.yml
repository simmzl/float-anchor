name: Build macOS Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build
        required: true
        default: v1.0.9
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-mac-release.yml

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="v1.0.9"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS packages
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Show release assets
        run: ls -lah release

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "FloatAnchor $TAG" \
              --notes "Improve WebDAV bidirectional sync and restore missing remote image cache."

      - name: Upload macOS release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            release/FloatAnchor-*-mac-*.dmg \
            release/FloatAnchor-*-mac-*.dmg.blockmap \
            release/latest-mac.yml \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
